* { margin: 0; padding: 0; box-sizing: border-box; }

.sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: #d7c3b3; border-radius: 10px; }

/* Filter checkbox */
.filter-checkbox {

  width: 16px;
  height: 16px;
  border: 1.5px solid #d7c3b3;
  border-radius: 3px;
  background: white;

  position: relative;
}
.filter-checkbox:checked {
  background: #884e08;

}
.filter-checkbox:checked::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 11px;
  font-weight: 700;
}

/* Marker */
.marker {

}
.marker:hover {
  transform: scale(1.15);
  box-shadow: 0 6px 16px rgba(136,78,8,0.3);
}
.marker img { width: 100%; height: 100%; object-fit: cover; }

/* Popup */
.maplibregl-popup { z-index: 1000 !important; }
.maplibregl-popup-content {
  padding: 0 !important;
  border-radius: 12px !important;
  overflow: hidden;
  background: #fdfbf3 !important;

}
.maplibregl-popup-close-button {
  font-size: 18px !important;
  width: 28px !important;

  background: white !important;

}
.maplibregl-popup-tip { border-top-color: #fdfbf3 !important; }
 
/* Site list item */

<script type="module">
import { getSites, getLocalArchive, SITE_ARCHIVES } from './js/site-data.js';

// ===================== MAP =====================
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      satellite: {
        type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256,
        maxzoom: 18
      },
      labels: {
        type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256,
        maxzoom: 18
      }
    },
    layers: [
      { id: 'satellite', type: 'raster', source: 'satellite' },
      { id: 'labels', type: 'raster', source: 'labels' }
    ]
  },
  center: [20, 30],
  zoom: 2.4,
  pitch: 30,
  antialias: true
});

map.addControl(new maplibregl.NavigationControl(), 'bottom-right');
setTimeout(() => map.resize(), 100);

// ===================== SITES =====================
const allSites = SITE_ARCHIVES;
let markers = [];
let markerElements = [];

function getPeriodColor(period) {
  const colors = {
    'Old Kingdom': '#884e08',
    'New Kingdom': '#a66622',
    'Nabataean': '#914634',
    'Roman Empire': '#4c6078',
    'Neolithic': '#4a7c59',
  };
  return colors[period] || '#857467';
}

function buildMarkerElement(site) {
  const el = document.createElement('div');
  el.className = 'marker';
  el.dataset.siteId = site.slug;
  el.innerHTML = `<img src="${site.img}" alt="${site.name}" style="pointer-events:none;" loading="lazy"/>`;
  return el;
}

function buildPopupHTML(site) {
  const period = site.categories?.period || '';
  const periodColor = getPeriodColor(period);
  return `
    <div class="font-body overflow-hidden" style="width:260px;">
      <div class="relative">
        <img src="${site.img}" class="w-full h-36 object-cover" alt="${site.name}" loading="lazy"/>
        ${period ? `<div class="absolute bottom-2 left-2"><span class="badge-period" style="background:${periodColor};color:white;">${period}</span></div>` : ''}
      </div>
      <div class="p-4 bg-surface">
        <h3 class="font-headline text-lg font-bold text-on-surface mb-1">${site.name}</h3>
        <p class="text-on-surface-variant text-xs leading-relaxed mb-3">${site.desc}</p>
        <div class="flex gap-2">
          <button onclick="window.openSiteArchive('${site.name.replace(/'/g,"\\'")}')" class="flex-1 bg-primary text-on-primary py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest hover:bg-primary-container transition-all active:scale-[0.98] text-center">Open Site</button>
          <button onclick="window.getDirections(${site.lat}, ${site.lng})" class="flex-1 bg-secondary text-on-secondary py-2 rounded-lg font-bold text-[10px] uppercase tracking-widest hover:opacity-90 transition-all active:scale-[0.98] text-center">Directions</button>
        </div>
      </div>
    </div>`;
}

function renderMarkers(sites) {
  // Clear existing
  markers.forEach(m => m.remove());
  markers = [];
  markerElements = [];

  sites.forEach(site => {
    const el = buildMarkerElement(site);
    const popup = new maplibregl.Popup({ offset: 25, maxWidth: '280px' }).setHTML(buildPopupHTML(site));

    const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat([site.lng, site.lat])
      .setPopup(popup)
      .addTo(map);

    markers.push(marker);
    markerElements.push({ el, site });
  });
}

// ===================== FILTER =====================
function applyFilters() {
  const search = document.getElementById('filter-search').value.toLowerCase().trim();
  const checkedPeriods = [...document.querySelectorAll('#sidebar input[type="checkbox"]')]
    .filter(cb => cb.closest('.filter-section-content') && cb.closest('.filter-section-content').previousElementSibling?.textContent?.trim()?.toLowerCase().startsWith('period') ? cb.checked : false)
    .map(cb => cb.value);
  // Actually simpler: get periods from first group
  const periodCheckboxes = [...document.querySelectorAll('#sidebar .filter-section-content')].filter((el, i) => i === 0)[0]?.querySelectorAll('input[type="checkbox"]') || [];
  const selectedPeriods = [...periodCheckboxes].filter(cb => cb.checked).map(cb => cb.value);

  const typeCheckboxes = [...document.querySelectorAll('#sidebar .filter-section-content')].filter((el, i) => i === 1)[0]?.querySelectorAll('input[type="checkbox"]') || [];
  const selectedTypes = [...typeCheckboxes].filter(cb => cb.checked).map(cb => cb.value);

  const filtered = allSites.filter(site => {
    const periodMatch = selectedPeriods.length === 0 || selectedPeriods.includes(site.categories.period);
    const typeMatch = selectedTypes.length === 0 || selectedTypes.includes(site.categories.siteType);
    const searchMatch = !search || site.name.toLowerCase().includes(search) || site.desc.toLowerCase().includes(search) || site.searchKeywords?.some(k => k.toLowerCase().includes(search));
    return periodMatch && typeMatch && searchMatch;
  });

  // Update markers
  markers.forEach((m, i) => {
    const site = allSites[i];
    const visible = filtered.includes(site);
    m.getElement().style.display = visible ? '' : 'none';
  });

  // Update site list
  updateSiteList(filtered);

  // Update stats
  document.getElementById('stat-sites').textContent = filtered.length;
  document.getElementById('stat-museums').textContent = filtered.filter(s => s.categories.siteType === 'Museum').length;
  document.getElementById('stat-excavations').textContent = filtered.filter(s => s.categories.siteType === 'Excavation').length;

  // Fit bounds
  if (filtered.length > 0) {
    const bounds = new maplibregl.LngLatBounds();
    filtered.forEach(site => bounds.extend([site.lng, site.lat]));
    map.fitBounds(bounds, { padding: 100, maxZoom: 10 });
  }
}

function updateSiteList(sites) {
  const list = document.getElementById('siteList');
  list.innerHTML = '';
  sites.forEach(site => {
    const div = document.createElement('div');
    div.className = 'site-list-item flex items-center gap-3 p-2.5 rounded-lg';
    div.innerHTML = `
      <div class="w-9 h-9 rounded-full overflow-hidden flex-shrink-0 border border-outline-variant/30">
        <img src="${site.img}" alt="${site.name}" class="w-full h-full object-cover" loading="lazy"/>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-xs font-bold text-on-surface truncate">${site.name}</div>
        <div class="text-[10px] text-on-surface-variant truncate">${site.categories.period} · ${site.categories.region}</div>
      </div>
    `;
    div.onclick = () => {
      map.flyTo({ center: [site.lng, site.lat], zoom: 14, pitch: 30, speed: 1.2 });
      // Find and open popup
      const idx = allSites.indexOf(site);
      if (idx >= 0 && markers[idx]) markers[idx].togglePopup();
    };
    list.appendChild(div);
  });
}

// ===================== SIDEBAR TOGGLE =====================
window.toggleSidebar = function() {
  const sidebar = document.getElementById('sidebar');
  const icon = document.getElementById('sidebar-toggle-icon');
  sidebar.classList.toggle('collapsed');
  icon.style.transform = sidebar.classList.contains('collapsed') ? 'rotate(180deg)' : 'rotate(0deg)';
};

// ===================== SECTION TOGGLE =====================
window.toggleSection = function(header) {
  const content = header.nextElementSibling;
  const icon = header.querySelector('.material-symbols-outlined');
  if (content.style.display === 'none') {
    content.style.display = '';
    icon.textContent = 'expand_less';
  } else {
    content.style.display = 'none';
    icon.textContent = 'expand_more';
  }
};

// ===================== ARCHIVE =====================
window.openSiteArchive = function(name) {
  const archive = getLocalArchive(name);
  if (archive) {
    renderArchiveDrawer(archive, name);
  } else {
    window.location.href = `archive.html?placeName=${encodeURIComponent(name)}`;
  }
};

function renderArchiveDrawer(archive, siteName) {
  const body = document.getElementById('archiveBody');
  const img = document.getElementById('archiveImage');
  const imageUrl = archive.imageGallery?.[0]?.url || '';

  if (imageUrl) { img.src = imageUrl; img.classList.remove('hidden'); }
  else { img.classList.add('hidden'); }

  const stats = archive.statistics ? Object.entries(archive.statistics).filter(([,v]) => v).map(([k,v]) => `<div class="flex justify-between py-2 border-b border-outline-variant/10 last:border-0"><span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">${k.replace(/([A-Z])/g,' $1').trim()}</span><span class="text-xs font-bold text-on-surface">${v}</span></div>`).join('') : '';
  const timeline = archive.timeline?.slice(0,5).map(item => `<div class="flex gap-3 py-2 border-l-2 border-primary/30 pl-3"><span class="text-[10px] font-bold text-primary whitespace-nowrap">${item.year}</span><span class="text-xs text-on-surface-variant">${item.event}</span></div>`).join('') || '';
  const chapters = archive.chapters?.slice(0,2).map(ch => `<div class="mb-4"><h4 class="font-headline text-sm font-bold text-on-surface mb-1">${ch.title}</h4><p class="text-xs text-on-surface-variant leading-relaxed">${ch.chapterIntro || ''}</p></div>`).join('') || '';

  body.innerHTML = `
    <h2 class="font-headline text-2xl font-bold text-on-surface mb-2">${archive.title || siteName}</h2>
    ${archive.summary ? `<p class="text-sm text-on-surface-variant leading-relaxed mb-6">${archive.summary.substring(0, 200)}...</p>` : ''}
    ${stats ? `<div class="mb-6"><h3 class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-2">Key Facts</h3><div class="bg-surface-container-low rounded-lg p-4">${stats}</div></div>` : ''}
    ${timeline ? `<div class="mb-6"><h3 class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-2">Timeline</h3><div class="space-y-1">${timeline}</div></div>` : ''}
    ${chapters ? `<div class="mb-6"><h3 class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-2">Chapters</h3>${chapters}</div>` : ''}
    <button onclick="window.location.href='archive.html?placeName=${encodeURIComponent(siteName)}'" class="w-full bg-primary text-on-primary py-3 rounded-lg font-bold text-[10px] uppercase tracking-widest hover:bg-primary-container transition-all">Full Archive</button>
  `;
  document.getElementById('archiveDrawer').classList.add('open');
}

window.closeArchive = function() {
  document.getElementById('archiveDrawer').classList.remove('open');
};

// ===================== DIRECTIONS =====================
window.getDirections = async function(destLat, destLng) {
  if (!navigator.geolocation) return alert("Geolocation not supported");
  navigator.geolocation.getCurrentPosition(async (pos) => {
    try {
      const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${pos.coords.longitude},${pos.coords.latitude};${destLng},${destLat}?steps=true&geometries=geojson&overview=full`);
      const data = await res.json();
      if (data.code !== 'Ok') throw new Error('No route');

      const route = data.routes[0];
      if (map.getSource('route')) map.getSource('route').setData(route.geometry);
      else {
        map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: route.geometry, properties: {} } });
        map.addLayer({ id: 'route-outline', type: 'line', source: 'route', paint: { 'line-color': '#ffffff', 'line-width': 10, 'line-opacity': 0.9 } });
        map.addLayer({ id: 'route', type: 'line', source: 'route', paint: { 'line-color': '#884e08', 'line-width': 6 } });
      }

      const bounds = route.geometry.coordinates.reduce((b, c) => b.extend(c), new maplibregl.LngLatBounds(route.geometry.coordinates[0], route.geometry.coordinates[0]));
      map.fitBounds(bounds, { padding: 100 });

      const stepsHtml = route.legs[0].steps.map(s => `<div class="flex gap-3 py-3 border-b border-outline-variant/10"><span class="material-symbols-outlined text-primary text-sm flex-shrink-0">explore</span><div><p class="text-xs text-on-surface leading-relaxed">${s.maneuver.instruction}</p><p class="text-[9px] font-bold text-on-surface-variant uppercase tracking-wider mt-0.5">${(s.distance/1000).toFixed(2)} km</p></div></div>`).join('');

      document.getElementById('directionsBody').innerHTML = `
        <div class="text-[10px] font-bold text-primary uppercase tracking-widest mb-3">In-App Navigation</div>
        <h2 class="font-headline text-2xl font-bold text-on-surface mb-4">Route Details</h2>
        <div class="bg-surface-container-low p-5 rounded-lg mb-6">
          <div class="grid grid-cols-2 gap-4">
            <div><p class="text-[9px] font-bold text-on-surface-variant uppercase tracking-wider mb-1">Distance</p><p class="text-lg font-headline font-bold text-primary">${(route.distance/1000).toFixed(1)} km</p></div>
            <div><p class="text-[9px] font-bold text-on-surface-variant uppercase tracking-wider mb-1">Time</p><p class="text-lg font-headline font-bold text-primary">${Math.round(route.duration/60)} min</p></div>
          </div>
        </div>
        <div class="space-y-1">${stepsHtml}</div>
      `;
      document.getElementById('directionsDrawer').classList.add('open');
    } catch(e) { alert('Could not find directions'); }
  }, () => alert('Please enable location services'));
};

window.closeDirections = function() {
  document.getElementById('directionsDrawer').classList.remove('open');
  if (map.getLayer('route')) map.removeLayer('route');
  if (map.getLayer('route-outline')) map.removeLayer('route-outline');
  if (map.getSource('route')) map.removeSource('route');
};

// ===================== MOBILE MENU =====================
window.toggleMobileMenu = function() {
  document.getElementById('mobile-menu').classList.toggle('-translate-x-full');
};

// ===================== SEARCH =====================
window.performSearch = async function(query) {
  if (!query) return;
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
    const data = await res.json();
    if (!data.length) return;
    const place = data[0];
    map.flyTo({ center: [parseFloat(place.lon), parseFloat(place.lat)], zoom: 12 });
  } catch(e) {}
};

// ===================== INIT =====================
map.on('load', () => {
  map.resize();
  renderMarkers(allSites);
  updateSiteList(allSites);
  applyFilters();
});

window.addEventListener('resize', () => map.resize());

// Expose for inline onclick
window.openSiteArchive = window.openSiteArchive;
window.getDirections = window.getDirections;
window.closeArchive = window.closeArchive;
</script>
