window.initMap = function() {

window.goToArchive = async function(name, lat, lng) {
    const drawer = document.getElementById('archive-drawer');
    const content = document.getElementById('archive-content');
    
    drawer.style.width = window.innerWidth > 768 ? '750px' : '100%';
    content.innerHTML = `
        <div class="animate-pulse space-y-8">
            <div class="h-72 bg-stone-200 rounded-xl"></div>
            <div class="space-y-4">
                <div class="h-10 bg-stone-200 rounded w-3/4"></div>
                <div class="h-4 bg-stone-200 rounded w-1/2"></div>
            </div>
            <div class="space-y-3">
                <div class="h-4 bg-stone-200 rounded w-full"></div>
                <div class="h-4 bg-stone-200 rounded w-full"></div>
                <div class="h-4 bg-stone-200 rounded w-2/3"></div>
            </div>
        </div>
    `;

    try {
        const prompt = `Generate a detailed archaeological dossier for "${name}". Include historical significance and architectural features. Format with <p> and <h3> tags.`;
        const response = await fetch(GROQ_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${GROQ_API_KEY}`
            },
            body: JSON.stringify({
                model: GROQ_MODEL,
                messages: [{ role: 'user', content: prompt }]
            })
        });
            
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        const aiText = data.choices[0].message.content;

        content.innerHTML = `
            <span class="text-[10px] font-bold text-amber-800 uppercase tracking-[0.2em] mb-3 block">AI Archival Record</span>
            <h1 class="text-4xl font-serif italic font-bold mb-4 text-stone-900 leading-tight">${name}</h1>
            <div class="prose prose-stone text-stone-700 leading-relaxed space-y-6 text-base font-light">
                ${aiText}
            </div>
            <div class="mt-12 pt-8 border-t border-stone-200/60">
                <a href="archive.html?placeName=${encodeURIComponent(name)}" class="inline-flex items-center gap-3 px-6 py-3 bg-stone-900 text-white rounded-lg font-bold text-[10px] uppercase tracking-widest hover:bg-stone-800 transition-all shadow-lg">
                    Access Full Archive <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </a>
            </div>
        `;
    } catch (e) {
        console.error("Map AI Sync Error:", e);
        content.innerHTML = `<p class="text-stone-400 italic py-20 text-center">AI synchronization failed: ${e.message}.</p>`;
    }
}

window.calculateRoute = async function(destLat, destLng) {
    if (!navigator.geolocation) {
        alert("Geolocation is not supported by your browser");
        return;
    }

    navigator.geolocation.getCurrentPosition(async (position) => {
        const startLng = position.coords.longitude;
        const startLat = position.coords.latitude;

        // Using OSRM public API for high-end driving directions
        const url = `https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${destLng},${destLat}?overview=full&geometries=geojson`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.code !== 'Ok') {
                alert("Unable to calculate route. Note that cross-continental driving paths are not supported.");
                return;
            }

            const route = data.routes[0].geometry;

            // Remove existing route layers before drawing new ones
            if (window.sawahMap.getLayer('route-outline')) window.sawahMap.removeLayer('route-outline');
            if (window.sawahMap.getLayer('route')) window.sawahMap.removeLayer('route'); // Main route layer
            
            if (window.sawahMap.getSource('route')) window.sawahMap.removeSource('route');

            window.sawahMap.addSource('route', {
                'type': 'geojson',
                'data': {
                    'type': 'Feature',
                    'properties': {},
                    'geometry': route
                }
            });

            // Add the outline layer first (thicker, black)
            window.sawahMap.addLayer({
                'id': 'route-outline',
                'type': 'line',
                'source': 'route',
                'layout': { 'line-join': 'round', 'line-cap': 'round' },
                'paint': {
                    'line-color': '#ffffff', // white outline
                    'line-width': 8, // Slightly thicker than the main line
                    'line-opacity': 0.9
                }
            });

            // Add the main route layer on top (thinner, colored)
            window.sawahMap.addLayer({
                'id': 'route',
                'type': 'line',
                'source': 'route',
                'layout': { 'line-join': 'round', 'line-cap': 'round' },
                'paint': {
                    'line-color': '#884e08', // Your desired line color
                    'line-width': 6,
                    'line-opacity': 0.9
                }
            });

            const coordinates = route.coordinates;
            const bounds = coordinates.reduce((bounds, coord) => bounds.extend(coord), new maplibregl.LngLatBounds(coordinates[0], coordinates[0]));
            window.sawahMap.fitBounds(bounds, { padding: 80, speed: 1.2 });
        } catch (err) {
            console.error("Routing error:", err);
        }
    }, (err) => alert("Access to location denied. Please enable geolocation to calculate directions."));
}

window.closeArchive = function() {
    document.getElementById('archive-drawer').style.width = '0';
}

window.openLightbox = function(src, caption) {
    const modal = document.getElementById('lightbox-modal');
    const img = document.getElementById('lightbox-img');
    const cap = document.getElementById('lightbox-caption');
    img.src = src;
    cap.innerText = caption;
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

window.closeLightbox = function() {
    const modal = document.getElementById('lightbox-modal');
    const img = document.getElementById('lightbox-img');
    if (img) img.src = "";
    modal.classList.add('hidden');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
const modal = document.getElementById('lightbox-modal');
modal.addEventListener('click', (e) => { if (e.target === modal) closeLightbox(); });

function toggleMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.toggle('-translate-x-full');
}

document.addEventListener('DOMContentLoaded', window.initMap);
</script>
