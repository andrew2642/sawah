<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Manrope',sans-serif;
    background:#fcf9ee;
    overflow:hidden;
}

#map{
    width:100%;
    height:100%;
}

.map-layout{
    position: relative;
    display: flex;
    height: calc(100vh - 64px);
    overflow: hidden;
}

/* MARKERS */
.marker{
    width:50px;
    height:50px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid #ffffff; /* White border for sticker effect */
    outline: 1px solid rgba(136, 78, 8, 0.2); /* Subtle outline */
    box-shadow: 0 4px 8px rgba(0,0,0,0.15), inset 0 0 0 1px rgba(0,0,0,0.05); /* Refined shadow */
    cursor:pointer;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease;
    background: white;
}

.marker:hover{
    transform: scale(1.15); /* No rotation on hover for cleaner look */
}

.marker img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* POPUP */

/* Ensure popups are always above markers */
.maplibregl-popup {
    z-index: 1000 !important;
}
.maplibregl-popup {
    z-index: 100 !important;
}

.maplibregl-popup-content{
    padding:0 !important;
    border-radius:20px !important;
    overflow:hidden;
    background:#fdfbf3 !important;
    box-shadow:0 20px 40px rgba(0,0,0,0.18) !important;
}

.maplibregl-popup-close-button{
    font-size:20px !important;
    width:30px !important;
    height:30px !important;
    border-radius:50% !important;
    background:white !important;
    border: 1px solid #e5e2d8; /* Add a subtle border to the close button */
    color:#333 !important;
    right:10px !important;
    top:10px !important;
}

/* ARCHIVE DRAWER */

#archiveDrawer{
    position:absolute;
    top:0;
    right:0; /* Start hidden off-screen to the right */
    transform: translateX(100%); /* Hide it completely */
    width:750px; /* Desktop width */
    max-width:100%;
    height:100%;
    background:#fdfbf3;
    z-index:1000;
    overflow-y:auto;
    transition: transform 0.5s ease-in-out; /* Animate transform */
    box-shadow:-20px 0 40px rgba(0,0,0,0.15);
}

/* DIRECTIONS DRAWER */
#directionsDrawer{
    position:absolute;
    top:0;
    right:0;
    transform: translateX(100%);
    width:750px;
    max-width:100%;
    height:100%;
    background:#fdfbf3;
    z-index:1000;
    overflow-y:auto;
    transition: transform 0.5s ease-in-out;
    box-shadow:-20px 0 40px rgba(0,0,0,0.15);
}
#directionsDrawer.open {
    transform: translateX(0);
}

/* Custom Scrollbar for Chat and Drawers */
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #d7c3b3; border-radius: 10px; }
@media (max-width: 767px) {
    #archiveDrawer, #directionsDrawer { width: 100%; }
}

/* When open, slide it into view */
#archiveDrawer.open {
    transform: translateX(0);
}

.archive-content{
    padding: 40px 40px 120px 40px; /* Added extra bottom padding for mobile link visibility */
}

.close-btn{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:30px;
    cursor:pointer;
    font-size:12px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:#777;
    font-weight:bold;
}

.archive-title{
    font-family:'Newsreader',serif;
    font-size:44px;
    font-style:italic;
    color:#111;
    margin-bottom:20px;
}

.archive-text{
    line-height:1.9;
    color:#524438;
}

map.on('load', () => {
    map.resize();
    renderSites();
});

function renderSites() {
    const siteList = document.getElementById('siteList');
    siteList.innerHTML = '';

    sites.forEach(site => {
    const el = document.createElement('div');
        el.className = 'marker';
        el.innerHTML = `<img src="${site.img}" alt="${site.name}" style="pointer-events:none;">`;

        const popup = new maplibregl.Popup({ offset: 25, maxWidth: '280px' }).setHTML(`
            <div class="font-body overflow-hidden">
                <img src="${site.img}" class="w-full h-40 object-cover">
                <div class="p-5 bg-surface">
                    <h3 class="font-headline text-xl text-primary italic font-bold mb-2">${site.name}</h3>
                    <p class="text-on-surface-variant text-sm leading-relaxed mb-4">${site.desc}</p>
                    <div class="flex gap-2">
                        <button onclick="window.openArchive('${site.name.replace(/'/g,"\\'")}')" class="flex-1 bg-primary text-on-primary py-2.5 rounded-lg font-bold text-[10px] uppercase tracking-widest hover:bg-primary-container transition-all active:scale-[0.98] shadow-sm">Archive</button>
                        <button onclick="window.getDirections(${site.lat}, ${site.lng})" class="flex-1 bg-secondary text-on-secondary py-2.5 rounded-lg font-bold text-[10px] uppercase tracking-widest hover:opacity-90 transition-all active:scale-[0.98] shadow-sm">Directions</button>
                    </div>
                </div>
            </div>
        `);

        const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
            .setLngLat([site.lng, site.lat])
            .setPopup(popup)
            .addTo(map);

        const item = document.createElement('div');
        item.className = 'p-4 rounded-xl cursor-pointer hover:bg-surface-container-highest transition-all text-sm font-medium text-stone-700';
        item.innerHTML = `<div>${site.name}</div><div class="text-[10px] opacity-60 uppercase mt-1">${site.desc.substring(0, 30)}...</div>`;
        item.onclick = () => {
            map.flyTo({ center: [site.lng, site.lat], zoom: 14, pitch: 30, speed: 1.2 });
            marker.togglePopup();
        };
        siteList.appendChild(item);
    });
}

/* =========================================================
   SEARCH & AI
========================================================= */

window.performSearch = async function(query) {
    if(!query) return;
    try{
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
        const data = await res.json();
        if(!data.length) return alert('Location not found');
        
        const place = data[0];
        const lat = parseFloat(place.lat);
        const lng = parseFloat(place.lon);

        map.flyTo({ center: [lng, lat], zoom: 12, pitch: 30 });

        const el = document.createElement('div');
        el.className = 'marker';
        el.innerHTML = `<img src="https://images.unsplash.com/photo-1521295121783-8a321d551ad2?auto=format&fit=crop&w=800&q=80">`;

        new maplibregl.Marker({ element: el, anchor: 'bottom' })
            .setLngLat([lng, lat])
            .setPopup(new maplibregl.Popup({ offset: 25, maxWidth: '240px' }).setHTML(`
                <div class="p-6 bg-surface font-body">
                    <h3 class="font-headline text-lg text-primary font-bold italic mb-2">${place.display_name.split(',')[0]}</h3>
                    <p class="text-on-surface-variant text-xs leading-relaxed">Archival coordinates identified via OpenStreetMap.</p>
                    <div class="flex gap-2 mt-4">
                        <button onclick="window.openArchive('${place.display_name.split(',')[0].replace(/'/g,"\\'")}')" class="flex-1 bg-primary text-on-primary py-2.5 rounded-lg font-bold text-[10px] uppercase tracking-widest hover:bg-primary-container transition-all active:scale-[0.98] shadow-sm">Archive</button>
                        <button onclick="window.getDirections(${lat}, ${lng})" class="flex-1 bg-secondary text-on-secondary py-2.5 rounded-lg font-bold text-[10px] uppercase tracking-widest hover:opacity-90 transition-all active:scale-[0.98] shadow-sm">Directions</button>
                    </div>
                </div>`))
            .addTo(map).togglePopup();
    }catch(err){
        console.error(err);
    }
};

   ARCHIVE
========================================================= */

window.openArchive = async function(name){
    const drawer = document.getElementById('archiveDrawer');
    const body = document.getElementById('archiveBody');
    drawer.classList.add('open');

    const site = sites.find(s => s.name === name);
    const archiveImg = document.getElementById('archiveImage');
    if (site && site.img) {
        archiveImg.src = site.img;
        archiveImg.classList.remove('hidden');
    } else {
        archiveImg.classList.add('hidden');
    }

    body.innerHTML = `<div class="animate-pulse space-y-4 pt-10"><div class="h-10 bg-stone-100 rounded w-3/4"></div><div class="h-4 bg-stone-100 rounded"></div><div class="h-4 bg-stone-100 rounded"></div></div>`;

    try {
        const response = await fetch(GROQ_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
            body: JSON.stringify({
                model: GROQ_MODEL,
                messages: [{ role: 'user', content: `Generate a brief archaeological dossier for "${name}". Include historical significance. Format with <p> and <h3> tags.` }]
            })
        });
        const data = await response.json();
        const aiText = data.choices[0].message.content;

        body.innerHTML = `
            <div class="text-[10px] font-bold text-primary uppercase tracking-[0.2em] mb-4">Archaeological Dossier</div>
            <h1 class="text-4xl font-serif italic mb-6">${name}</h1>
            <div class="text-stone-700 leading-relaxed space-y-4 font-body text-sm">${aiText}</div>
            <div class="mt-8 pt-6 border-t border-stone-100">
                <a href="archive.html?placeName=${encodeURIComponent(name)}" class="inline-flex items-center gap-2 text-primary font-bold text-[10px] uppercase tracking-widest hover:underline">
                    see full archive <span class="material-symbols-outlined text-sm">open_in_new</span>
                </a>
            </div>
        `;
    } catch (e) {
        body.innerHTML = `<p class="pt-10 text-stone-400 italic">Oracle offline. Wikipedia links available below.</p>`;
    }
};

window.closeArchive = function(){
    document.getElementById('archiveDrawer').classList.remove('open');
    document.getElementById('archiveImage').classList.add('hidden');
    }; 

window.getDirections = async function(destLat, destLng) {
    if (!navigator.geolocation) return alert("Geolocation is not supported by your browser");
    
    navigator.geolocation.getCurrentPosition(async (position) => {
        const startLng = position.coords.longitude;
        const startLat = position.coords.latitude;

        try {
            const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${destLng},${destLat}?steps=true&geometries=geojson&overview=full`);
            const data = await response.json();
            if (data.code !== 'Ok') throw new Error("Directions not found");

            const route = data.routes[0];
            const geojson = { 'type': 'Feature', 'properties': {}, 'geometry': route.geometry };

            if (map.getSource('route')) {
                map.getSource('route').setData(geojson);
            } else {
                map.addSource('route', { 'type': 'geojson', 'data': geojson });
                map.addLayer({
                    'id': 'route-outline',
                    'type': 'line',
                    'source': 'route',
                    'layout': { 'line-join': 'round', 'line-cap': 'round' },
                    'paint': { 'line-color': '#ffffff', 'line-width': 10, 'line-opacity': 0.9 }
                });
                map.addLayer({
                    'id': 'route',
                    'type': 'line',
                    'source': 'route',
                    'layout': { 'line-join': 'round', 'line-cap': 'round' },
                    'paint': { 'line-color': '#884e08', 'line-width': 6, 'line-opacity': 1 }
                });
            }

            const coordinates = route.geometry.coordinates;
            const bounds = coordinates.reduce((acc, coord) => acc.extend(coord), new maplibregl.LngLatBounds(coordinates[0], coordinates[0]));
            map.fitBounds(bounds, { padding: 100 });

            const drawer = document.getElementById('directionsDrawer');
            const body = document.getElementById('directionsBody');
            
            let stepsHtml = route.legs[0].steps.map(step => `
                <div class="py-4 border-b border-stone-100 flex gap-4 items-start">
                    <span class="material-symbols-outlined text-primary text-lg">explore</span>
                    <div><p class="text-sm font-body text-stone-700 leading-relaxed">${step.maneuver.instruction}</p><p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mt-1">${(step.distance / 1000).toFixed(2)} km</p></div>
                </div>`).join('');

            body.innerHTML = `<div class="text-[10px] font-bold text-primary uppercase tracking-[0.2em] mb-4">In-App Navigation</div><h1 class="text-4xl font-serif italic mb-6">Route Details</h1><div class="bg-surface-container-low p-6 rounded-2xl mb-8 border border-outline-variant/10"><div class="grid grid-cols-2 gap-4"><div><p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Distance</p><p class="text-xl font-headline italic text-primary">${(route.distance / 1000).toFixed(1)} km</p></div><div><p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Time</p><p class="text-xl font-headline italic text-primary">${Math.round(route.duration / 60)} min</p></div></div></div><div class="space-y-2">${stepsHtml}</div>`;
            drawer.classList.add('open');
        } catch (e) {
        }
    }, () => alert("Please enable location services to get directions."));
};

window.closeDirections = function() {
    document.getElementById('directionsDrawer').classList.remove('open');
    if (map.getLayer('route')) map.removeLayer('route');
    if (map.getLayer('route-outline')) map.removeLayer('route-outline');
    if (map.getSource('route')) map.removeSource('route');
};

window.toggleSideIndex = function() {
    if (window.innerWidth >= 768) return;
    
    const aside = document.getElementById('side-index');
    const icon = document.getElementById('index-toggle-icon');
    const fabs = document.getElementById('map-fabs');
    
    const isCollapsed = aside.classList.contains('translate-y-[calc(100%-60px)]');
    
    if (isCollapsed) {
        aside.classList.remove('translate-y-[calc(100%-60px)]');
        aside.classList.add('translate-y-0');
        icon.style.transform = 'rotate(180deg)';
        fabs.style.transform = 'translateY(-38vh)';
    } else {
        aside.classList.add('translate-y-[calc(100%-60px)]');
        aside.classList.remove('translate-y-0');
        icon.style.transform = 'rotate(0deg)';
        fabs.style.transform = 'translateY(0)';
    }
};

window.toggleChat = function() {
    const chat = document.getElementById('ai-chat-container');
    chat.classList.toggle('hidden');
};

window.sendChatMessage = async function() {
    const input = document.getElementById('chat-input');
    const container = document.getElementById('chat-messages');
    if(!input.value.trim()) return;
    
    const userText = input.value;
    input.value = '';
    container.innerHTML += `<p class="text-right text-stone-900 not-italic font-bold mb-4">${userText}</p>`;

    try {
        const res = await fetch(GROQ_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
            body: JSON.stringify({
                model: GROQ_MODEL,
                messages: [{ role: 'system', content: "You are the Sawah Oracle, a digital historian. Answer queries about history or archaeology concisely." }, { role: 'user', content: userText }]
            })
        });
        const data = await res.json();
        container.innerHTML += `<p class="text-stone-600 mb-6">${data.choices[0].message.content}</p>`;
        container.scrollTop = container.scrollHeight;
    } catch (e) {
        container.innerHTML += `<p class="text-stone-400">The Oracle is momentarily silent.</p>`;
    }
};

window.toggleMobileMenu = function() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.toggle('-translate-x-full');
};

window.addEventListener('resize', () => map.resize());
